<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#4D0FC1"/>
  <!-- Isotipo Strategio: cuadrado central + 4 flechas -->
  <rect x="12.5" y="12.5" width="7" height="7" fill="white"/>
  <!-- Arriba derecha -->
  <polygon points="21,7 26,7 26,12" fill="white"/>
  <!-- Abajo derecha -->
  <polygon points="26,20 26,25 21,25" fill="white"/>
  <!-- Abajo izquierda -->
  <polygon points="11,25 6,25 6,20" fill="white"/>
  <!-- Arriba izquierda -->
  <polygon points="6,12 6,7 11,7" fill="white"/>
</svg>
